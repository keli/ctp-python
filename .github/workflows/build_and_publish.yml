on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      api_ver:
        description: "CTP API version (e.g. 6.7.7)"
        required: false
        default: "6.7.7"
      build_ver:
        description: "Build version override (e.g. 6.7.7.post1, leave empty to use api_ver)"
        required: false
        default: ""
      publish:
        description: "Publish to PyPI after build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      api_ver: ${{ steps.vars.outputs.api_ver }}
      build_ver: ${{ steps.vars.outputs.build_ver }}
      publish: ${{ steps.vars.outputs.publish }}
    steps:
      - name: Compute versions
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: strip leading 'v' for build_ver, derive api_ver by removing post suffix
            TAG="${{ github.ref_name }}"
            BUILD_VER="${TAG#v}"
            API_VER=$(echo "$BUILD_VER" | sed 's/\.post[0-9]*//')
            echo "api_ver=$API_VER" >> $GITHUB_OUTPUT
            echo "build_ver=$BUILD_VER" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            API_VER="${{ github.event.inputs.api_ver }}"
            BUILD_VER="${{ github.event.inputs.build_ver }}"
            echo "api_ver=$API_VER" >> $GITHUB_OUTPUT
            echo "build_ver=$BUILD_VER" >> $GITHUB_OUTPUT
            echo "publish=${{ github.event.inputs.publish }}" >> $GITHUB_OUTPUT
          fi

  build_unix:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        version: ["cp38", "cp39", "cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup swig for macos
        if: matrix.os == 'macos-latest'
        run: |
          brew install swig
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Setup pip
        run: |
          python -m pip install --upgrade pip cibuildwheel

      - name: Build wheel
        run: python -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: ${{ matrix.version }}-*
          CIBW_SKIP: "cp36-* *-win* *_i686 *-musllinux*"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          # Skip delocate for macOS builds
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
          CIBW_ENVIRONMENT: "API_VER=${{ needs.setup.outputs.api_ver }} BUILD_VER=${{ needs.setup.outputs.build_ver }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ctp-python-${{ matrix.os }}-${{ matrix.version }}
          path: ./dist/*.whl

  build_win:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}

      - name: Prepare Windows
        if: matrix.os == 'windows-latest'
        run: |
          conda init
          conda install -c conda-forge libiconv

      - name: Setup pip for Windows
        run: |
          python -m pip install --upgrade pip wheel build

      - name: Build wheel for Windows
        run: python -m build -w -n
        env:
          API_VER: ${{ needs.setup.outputs.api_ver }}
          BUILD_VER: ${{ needs.setup.outputs.build_ver }}

      - uses: actions/upload-artifact@v4
        with:
          name: ctp-python-${{ matrix.os }}-${{ matrix.python-version }}
          path: ./dist/*.whl

  publish:
    needs: [setup, build_unix, build_win]
    runs-on: ubuntu-latest
    if: needs.setup.outputs.publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/ctp-python
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ctp-python-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
